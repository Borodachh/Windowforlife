server {
    listen 443 ssl http2;
    server_name windowforlife.ru www.windowforlife.ru;

    ssl_certificate     /etc/letsencrypt/live/windowforlife.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/windowforlife.ru/privkey.pem;

    # Modern SSL config
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /var/www/windowforlife/frontend/dist;
    index index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # Immutable static assets (hashed filenames from Vite)
    location ~* \.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Images and fonts — long cache
    location ~* \.(png|jpg|jpeg|gif|webp|svg|ico|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # HTML — no cache (SPA index.html меняется при каждом деплое)
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # robots.txt и sitemap — кэш на 1 день
    location ~* \.(txt|xml)$ {
        expires 1d;
        add_header Cache-Control "public";
    }

    # Логи
    access_log /var/log/nginx/windowforlife.access.log;
    error_log  /var/log/nginx/windowforlife.error.log;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name windowforlife.ru www.windowforlife.ru;
    return 301 https://$host$request_uri;
}

# www → non-www redirect
server {
    listen 443 ssl http2;
    server_name www.windowforlife.ru;
    ssl_certificate     /etc/letsencrypt/live/windowforlife.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/windowforlife.ru/privkey.pem;
    return 301 https://windowforlife.ru$request_uri;
}
