    <!-- JSON-LD: FAQPage — populated from static data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Сколько времени занимает изготовление и монтаж окон?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Стандартные размеры изготавливаются за 5–10 рабочих дней. Нестандартные конструкции — до 15 рабочих дней. Монтаж одного-двух окон занимает 2–4 часа."
          }
        },
        {
          "@type": "Question",
          "name": "Какая гарантия предоставляется на окна и монтаж?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "На профильные системы Knipping и KBE — гарантия производителя от 8 до 10 лет. На монтажные работы — 3 года."
          }
        },
        {
          "@type": "Question",
          "name": "Можно ли устанавливать окна зимой?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Да, мы работаем круглый год. Монтаж при температуре до −15 °C выполняется с соблюдением технологических требований."
          }
        },
        {
          "@type": "Question",
          "name": "Как происходит бесплатный замер?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Оставляете заявку на сайте или звоните нам. Согласовываем удобное время. Замерщик приезжает, измеряет проёмы и консультирует. После замера в течение 1–2 часов вы получаете точный расчёт."
          }
        },
        {
          "@type": "Question",
          "name": "Какие варианты оплаты доступны?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Принимаем наличные, банковские карты и безналичный перевод. Возможна оплата в два этапа: аванс 50% при подписании договора."
          }
        }
      ]
    }
    </script>
