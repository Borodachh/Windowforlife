  <rect x="17" y="7.5" width="7.5" height="7.5" fill="white" fill-opacity="0.15"/>
  <rect x="7.5" y="17" width="7.5" height="7.5" fill="white" fill-opacity="0.15"/>
  <rect x="17" y="17" width="7.5" height="7.5" fill="white" fill-opacity="0.1"/>
